<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CineRoll</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0e;
    --surface: #0f1217;
    --surface2: #161b24;
    --accent: #e63946;
    --accent2: #ff6b6b;
    --gold: #f4a261;
    --text: #eef0f5;
    --muted: #7a8099;
    --border: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: linear-gradient(to bottom, rgba(8,10,14,0.95) 0%, transparent 100%);
    backdrop-filter: blur(4px);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 24px rgba(230,57,70,0.5);
  }
  .nav-right { display: flex; gap: 14px; align-items: center; }
  .nav-icon {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-icon:hover { background: var(--accent); border-color: var(--accent); }
  .nav-icon svg { width: 16px; height: 16px; fill: none; stroke: var(--text); stroke-width: 2; }

  /* ── HERO ── */
  #hero {
    position: relative;
    width: 100%;
    height: 100svh;
    min-height: 600px;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-color: #1a0a0a;
    background-size: cover;
    background-position: center top;
    transition: opacity 0.8s ease;
  }
  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(8,10,14,0.4) 0%,
      rgba(8,10,14,0.1) 30%,
      rgba(8,10,14,0.7) 60%,
      rgba(8,10,14,1) 100%
    );
  }

  .hero-content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 20px 28px;
    z-index: 2;
  }

  .genre-tags {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .genre-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent2);
    background: rgba(230,57,70,0.15);
    border: 1px solid rgba(230,57,70,0.3);
    border-radius: 4px;
    padding: 3px 8px;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(38px, 10vw, 56px);
    line-height: 0.95;
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.8);
  }

  .hero-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--muted);
  }
  .hero-meta .year { color: var(--text); font-weight: 500; }
  .hero-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }
  .rating-badge {
    display: flex; align-items: center; gap: 4px;
    background: rgba(244,162,97,0.15);
    border: 1px solid rgba(244,162,97,0.3);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--gold);
  }

  .hero-summary {
    font-size: 13px;
    line-height: 1.6;
    color: rgba(238,240,245,0.75);
    margin-bottom: 22px;
  }
  .expandable-copy {
    display: inline;
  }
  .expandable-toggle {
    display: inline;
    margin-left: 6px;
    padding: 0;
    border: 0;
    background: none;
    color: var(--accent2);
    font-family: 'DM Sans', sans-serif;
    font-size: inherit;
    font-weight: 600;
    line-height: inherit;
    cursor: pointer;
    white-space: nowrap;
    vertical-align: baseline;
  }

  .hero-buttons {
    display: flex; gap: 10px;
  }
  .btn-play {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 8px 24px rgba(230,57,70,0.35);
  }
  .btn-play:active { transform: scale(0.97); box-shadow: none; }
  .btn-play svg { width: 16px; height: 16px; fill: white; }

  .btn-random {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: rgba(255,255,255,0.08);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-random:active { transform: scale(0.97); background: rgba(255,255,255,0.12); }
  .btn-random svg { width: 15px; height: 15px; fill: none; stroke: var(--text); stroke-width: 2; }

  /* ── SCENES ── */
  #scenes-section {
    padding: 24px 0;
    background: var(--bg);
  }
  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px;
    margin-bottom: 14px;
  }
  .scenes-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 0 20px;
    scrollbar-width: none;
  }
  .scenes-scroll::-webkit-scrollbar { display: none; }
  .scene-card {
    flex: 0 0 140px;
    height: 88px;
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface2);
    cursor: pointer;
    position: relative;
    transition: transform 0.2s;
  }
  .scene-card:active { transform: scale(0.97); }
  .scene-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .scene-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.4) 100%);
  }

  /* ── REVIEWS ── */
  #reviews-section {
    padding: 24px 20px;
    background: var(--bg);
  }
  #links-section {
    padding: 8px 20px 24px;
    background: var(--bg);
    display: flex;
    justify-content: center;
  }
  #trailer-section {
    padding: 8px 20px 20px;
    background: var(--bg);
  }
  .trailer-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
  }
  .trailer-card.visible {
    display: block;
  }
  .trailer-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px 12px;
  }
  .trailer-kicker {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(238,240,245,0.52);
  }
  .trailer-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }
  .trailer-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: rgba(238,240,245,0.82);
    font-size: 11px;
    white-space: nowrap;
  }
  .trailer-frame-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #090b10;
  }
  .trailer-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
  .review-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .review-card::before {
    content: '"';
    position: absolute;
    top: -8px; left: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    color: var(--accent);
    opacity: 0.15;
    line-height: 1;
  }
  .review-text {
    font-size: 13px;
    line-height: 1.65;
    color: rgba(238,240,245,0.7);
    font-style: italic;
    position: relative;
    z-index: 1;
  }
  .imdb-link {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: var(--text);
    background: linear-gradient(135deg, rgba(255, 209, 102, 0.2), rgba(255,255,255,0.04));
    border: 1px solid rgba(255, 209, 102, 0.24);
    border-radius: 16px;
    padding: 14px 16px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
    margin: 0 auto;
  }
  .imdb-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 54px;
    height: 34px;
    padding: 0 10px;
    border-radius: 10px;
    background: linear-gradient(135deg, #f6c945, #ffd86f);
    color: #111;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .imdb-meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .imdb-label {
    font-size: 10px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: rgba(238,240,245,0.58);
  }
  .imdb-title {
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.92);
  }

  .scene-lightbox {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(4, 6, 10, 0.82);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 300;
  }
  .scene-lightbox.open {
    opacity: 1;
    pointer-events: auto;
  }
  .scene-lightbox-stage {
    width: min(92vw, 920px);
    max-width: 920px;
    overflow: hidden;
    border-radius: 16px;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    border: 1px solid rgba(255,255,255,0.08);
    background: #0c1016;
    touch-action: none;
  }
  .scene-lightbox-track {
    display: flex;
    width: 300%;
    transform: translateX(-33.3333%);
    will-change: transform;
  }
  .scene-lightbox-slide {
    width: 33.3333%;
    flex: 0 0 33.3333%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0c1016;
    overflow: hidden;
  }
  .scene-lightbox-slide img {
    width: 100%;
    height: 100%;
    max-width: min(92vw, 920px);
    max-height: 84vh;
    object-fit: contain;
    display: block;
    transform-origin: center center;
    user-select: none;
    -webkit-user-drag: none;
    will-change: transform;
  }
  .scene-lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 46px;
    height: 46px;
    border: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    color: var(--text);
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
  }
  .scene-lightbox-nav.prev { left: 18px; }
  .scene-lightbox-nav.next { right: 18px; }
  .scene-lightbox-close {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 42px;
    height: 42px;
    border: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    color: var(--text);
    font-size: 24px;
    cursor: pointer;
  }

  /* ── STARS ── */
  .stars {
    display: flex; gap: 2px; margin-bottom: 10px;
  }
  .star { font-size: 13px; }
  .star.filled { color: var(--gold); }
  .star.empty { color: var(--surface2); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    background: rgba(8,10,14,0.92);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 10px 0 max(10px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .bnav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 4px;
  }
  .bnav-item svg { width: 20px; height: 20px; fill: none; stroke: var(--muted); stroke-width: 1.8; transition: stroke 0.2s; }
  .bnav-item span { font-size: 10px; color: var(--muted); letter-spacing: 0.3px; transition: color 0.2s; }
  .bnav-item.active svg { stroke: var(--accent); }
  .bnav-item.active span { color: var(--accent); }

  /* ── FADE IN ── */
  .fade-up {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── BOTTOM PADDING ── */
  .bottom-pad {
    height: 80px;
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 20px;
  }
</style>
</head>
<body>



<!-- Hero -->
<div id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-content">
    <div class="genre-tags" id="genreTags"></div>
    <div class="hero-title" id="heroTitle"></div>
    <div class="hero-meta">
      <span class="year" id="heroYear"></span>
      <span class="dot"></span>
      <div class="rating-badge">
        <span>★</span>
        <span id="heroRating"></span>
      </div>
    </div>
    <div class="hero-summary" id="heroSummary"></div>
    <div class="hero-buttons">
      
      <button class="btn-random" id="randomBtn">
        <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        Random
      </button>
    </div>
  </div>
</div>

<!-- Scenes -->
<div id="scenes-section">
  <div class="section-label">Scenes</div>
  <div class="scenes-scroll" id="scenesScroll"></div>
</div>

<div class="divider"></div>

<!-- Reviews -->
<div id="reviews-section">
  <div class="section-label">Reviews</div>
  <div id="reviewsList"></div>
</div>

<div id="trailer-section">
  <div class="trailer-card" id="trailerCard">
    <div class="trailer-head">
      <div>
        <div class="trailer-kicker">Trailer</div>
        <div class="trailer-title" id="trailerTitle">Official Trailer</div>
      </div>
      <div class="trailer-pill">YouTube</div>
    </div>
    <div class="trailer-frame-wrap">
      <iframe
        class="trailer-frame"
        id="trailerFrame"
        title="Movie trailer"
        src=""
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
      ></iframe>
    </div>
  </div>
</div>

<div id="links-section">
  <a class="imdb-link" id="imdbLink" href="#" target="_blank" rel="noopener noreferrer">
      <span class="imdb-badge">IMDb</span>
      <span class="imdb-meta">
      <span class="imdb-label">IMDb Page</span>
      <span class="imdb-title">View on IMDb</span>
      </span>
  </a>
</div>

<div class="bottom-pad"></div>

<div class="scene-lightbox" id="sceneLightbox" aria-hidden="true">
  <button class="scene-lightbox-nav prev" id="sceneLightboxPrev" aria-label="Previous scene">&#8249;</button>
  <button class="scene-lightbox-nav next" id="sceneLightboxNext" aria-label="Next scene">&#8250;</button>
  <button class="scene-lightbox-close" id="sceneLightboxClose" aria-label="Close">&times;</button>
  <div class="scene-lightbox-stage" id="sceneLightboxStage">
    <div class="scene-lightbox-track" id="sceneLightboxTrack">
      <div class="scene-lightbox-slide"><img id="sceneImagePrev" alt="Previous scene"></div>
      <div class="scene-lightbox-slide"><img id="sceneImageCurrent" alt="Current scene"></div>
      <div class="scene-lightbox-slide"><img id="sceneImageNext" alt="Next scene"></div>
    </div>
  </div>
</div>


<script>
const MOVIES_URL = 'movies.json';
const TRAILERS_URL = 'trailers.json';
const UI_TEXT = {
  more: 'More',
  less: 'Less',
  noReview: 'No review text.',
  moviesLoadErrorTitle: 'Movies could not be loaded',
  moviesLoadErrorBody: 'movies.json could not be read. Try opening the page through a local server.',
  imdbTitleSuffix: 'on IMDb',
  trailerTitleSuffix: 'Official Trailer'
};
let movies = [];
let trailers = {};
let currentIdx = 0;
let currentSceneIndex = 0;
let lightboxAnimating = false;

// Shuffle (Fisher-Yates) tabanlı sıra — aynı film arka arkaya gelmez,
// tüm filmler bitmeden tekrar başlamaz.
let shuffleQueue = [];

const zoomState = {
  scale: 1,
  x: 0,
  y: 0,
  startScale: 1,
  startX: 0,
  startY: 0,
  startDistance: 0,
  startCenterX: 0,
  startCenterY: 0,
  swipeStartX: 0,
  swipeLastX: 0,
  swipeLastTime: 0,
  swipeDeltaX: 0,
  isSwiping: false,
  isPanning: false,
  isPinching: false
};

function buildQueue(excludeIdx = -1) {
  const indices = Array.from({ length: movies.length }, (_, i) => i);
  // Fisher-Yates karıştırma
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  // Yeni kuyruk bir önceki filmle başlamasın
  if (indices[0] === excludeIdx && indices.length > 1) {
    const swap = Math.floor(Math.random() * (indices.length - 1)) + 1;
    [indices[0], indices[swap]] = [indices[swap], indices[0]];
  }
  return indices;
}

function getRandom(exclude = -1) {
  if (movies.length <= 1) return 0;
  if (shuffleQueue.length === 0) {
    shuffleQueue = buildQueue(exclude);
  }
  return shuffleQueue.shift();
}

function resetShuffle(exclude = -1) {
  shuffleQueue = buildQueue(exclude);
}

function decodeText(value) {
  const textarea = document.createElement('textarea');
  textarea.innerHTML = String(value ?? '');
  return textarea.value;
}

function starsHTML(rating) {
  const full = Math.round(rating / 2);
  let html = '';
  for (let i = 1; i <= 5; i++) {
    html += `<span class="star ${i <= full ? 'filled' : 'empty'}">&#9733;</span>`;
  }
  return html;
}

function escapeHtml(text = '') {
  return String(text)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function renderExpandableText(text, maxLength) {
  const fullText = decodeText(text || '').trim();
  const needsToggle = fullText.length > maxLength;
  const collapsedText = needsToggle ? `${fullText.slice(0, maxLength).trimEnd()}...` : fullText;
  const buttonHtml = needsToggle
    ? `<button class="expandable-toggle" type="button" aria-expanded="false" data-more-label="${UI_TEXT.more}" data-less-label="${UI_TEXT.less}">${UI_TEXT.more}</button>`
    : '';
  return `<span class="expandable-copy" data-full="${escapeHtml(fullText)}" data-collapsed="${escapeHtml(collapsedText)}" data-expanded="false">${escapeHtml(collapsedText)}</span>${buttonHtml}`;
}

function trailerEmbedUrl(videoId) {
  const safeId = encodeURIComponent(String(videoId || '').trim());
  return `https://www.youtube-nocookie.com/embed/${safeId}?rel=0&modestbranding=1&playsinline=1`;
}

function renderTrailer(movie) {
  const trailerCard = document.getElementById('trailerCard');
  const trailerFrame = document.getElementById('trailerFrame');
  const trailerTitle = document.getElementById('trailerTitle');
  const trailerId = trailers[decodeText(movie.tt)];

  if (!trailerId) {
    trailerCard.classList.remove('visible');
    trailerFrame.src = '';
    return;
  }

  trailerTitle.textContent = `${decodeText(movie.title)} ${UI_TEXT.trailerTitleSuffix}`;
  trailerFrame.src = trailerEmbedUrl(trailerId);
  trailerCard.classList.add('visible');
}

function renderMovie(idx) {
  if (!movies.length || !movies[idx]) return;
  const m = movies[idx];

  // Hero bg
  const bg = document.getElementById('heroBg');
  bg.style.opacity = 0;
  bg.style.backgroundImage = `url(${m.poster})`;
  // Show immediately even if image fails
  setTimeout(() => { bg.style.opacity = 1; }, 50);

  // Genres
  document.getElementById('genreTags').innerHTML = m.genres.map(g => `<span class="genre-tag">${escapeHtml(decodeText(g))}</span>`).join('');

  // Title
  document.getElementById('heroTitle').textContent = decodeText(m.title);

  // Year
  document.getElementById('heroYear').textContent = decodeText(m.year);

  // Rating
  document.getElementById('heroRating').textContent = m.rating + ' / 10';

  // Summary
  document.getElementById('heroSummary').innerHTML = renderExpandableText(m.summary, 180);

  // Scenes
  const scenes = document.getElementById('scenesScroll');
  scenes.innerHTML = m.scenes.map((s, sceneIndex) => `
    <div class="scene-card" data-scene-index="${sceneIndex}">
      <img src="${s}" alt="scene" loading="lazy" onerror="this.parentElement.style.display='none'">
    </div>
  `).join('');

  // Reviews
  const revList = document.getElementById('reviewsList');
  const reviews = m.reviews.slice(0, 3);
  revList.innerHTML = reviews.map((r, i) => `
    <div class="review-card fade-up" style="transition-delay:${i * 0.1}s">
      <div class="stars">${starsHTML(m.rating)}</div>
      <div class="review-text">${renderExpandableText(r.body || UI_TEXT.noReview, 260)}</div>
    </div>
  `).join('');

  // IMDb link
  const imdbLink = document.getElementById('imdbLink');
  imdbLink.href = `https://www.imdb.com/title/${decodeText(m.tt)}/`;
  imdbLink.querySelector('.imdb-title').textContent = `${decodeText(m.title)} ${UI_TEXT.imdbTitleSuffix}`;

  renderTrailer(m);

  // Trigger fade-ups
  setTimeout(() => {
    document.querySelectorAll('.fade-up').forEach(el => el.classList.add('visible'));
  }, 100);

  currentIdx = idx;
}

function getSceneList() {
  return movies[currentIdx]?.scenes || [];
}

function normalizeSceneIndex(index) {
  const sceneList = getSceneList();
  if (!sceneList.length) return 0;
  return (index + sceneList.length) % sceneList.length;
}

function currentSceneImage() {
  return document.getElementById('sceneImageCurrent');
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function getMaxPan(scale) {
  const image = currentSceneImage();
  const stage = document.getElementById('sceneLightboxStage');
  if (!image || !stage) return { x: 0, y: 0 };
  return {
    x: Math.max(0, ((image.clientWidth * scale) - stage.clientWidth) / 2),
    y: Math.max(0, ((image.clientHeight * scale) - stage.clientHeight) / 2)
  };
}

function applyZoomTransform(animate = false) {
  const image = currentSceneImage();
  if (!image) return;
  image.style.transition = animate ? 'transform 0.24s ease' : 'none';
  image.style.transform = `translate(${zoomState.x}px, ${zoomState.y}px) scale(${zoomState.scale})`;
}

function resetZoom(animate = false) {
  zoomState.scale = 1;
  zoomState.x = 0;
  zoomState.y = 0;
  zoomState.isSwiping = false;
  zoomState.isPanning = false;
  zoomState.isPinching = false;
  zoomState.swipeStartX = 0;
  zoomState.swipeLastX = 0;
  zoomState.swipeLastTime = 0;
  zoomState.swipeDeltaX = 0;
  applyZoomTransform(animate);
}

function setTrackPosition(percent, animate = false) {
  const track = document.getElementById('sceneLightboxTrack');
  track.style.transition = animate ? 'transform 0.42s cubic-bezier(0.22, 1, 0.36, 1)' : 'none';
  track.style.transform = `translate3d(${percent}%, 0, 0)`;
}

function syncLightboxImages() {
  const sceneList = getSceneList();
  if (!sceneList.length) return;
  const prevIndex = normalizeSceneIndex(currentSceneIndex - 1);
  const nextIndex = normalizeSceneIndex(currentSceneIndex + 1);
  document.getElementById('sceneImagePrev').src = sceneList[prevIndex];
  document.getElementById('sceneImageCurrent').src = sceneList[currentSceneIndex];
  document.getElementById('sceneImageNext').src = sceneList[nextIndex];
  resetZoom(false);
}

function showSceneAt(index) {
  const sceneList = getSceneList();
  if (!sceneList.length) return;
  currentSceneIndex = normalizeSceneIndex(index);
  syncLightboxImages();
  setTrackPosition(-33.3333, false);
}

function animateSceneShift(direction) {
  if (lightboxAnimating || zoomState.scale > 1) return;
  lightboxAnimating = true;
  const track = document.getElementById('sceneLightboxTrack');
  const target = direction === 'next' ? -66.6667 : 0;
  setTrackPosition(target, true);
  track.addEventListener('transitionend', () => {
    currentSceneIndex = normalizeSceneIndex(currentSceneIndex + (direction === 'next' ? 1 : -1));
    syncLightboxImages();
    setTrackPosition(-33.3333, false);
    lightboxAnimating = false;
  }, { once: true });
}

function getTouchDistance(touchA, touchB) {
  return Math.hypot(touchA.clientX - touchB.clientX, touchA.clientY - touchB.clientY);
}

function getTouchCenter(touchA, touchB) {
  return {
    x: (touchA.clientX + touchB.clientX) / 2,
    y: (touchA.clientY + touchB.clientY) / 2
  };
}

function beginSwipe(touch) {
  zoomState.isSwiping = true;
  zoomState.swipeStartX = touch.clientX;
  zoomState.swipeLastX = touch.clientX;
  zoomState.swipeLastTime = performance.now();
  zoomState.swipeDeltaX = 0;
}

function softenedSwipePercent(deltaX, stageWidth) {
  const raw = (deltaX / stageWidth) * 33.3333;
  const limited = Math.sign(raw) * Math.pow(Math.abs(raw), 0.92);
  return clamp(limited, -24, 24);
}

function beginPan(touch) {
  zoomState.isPanning = true;
  zoomState.startX = touch.clientX - zoomState.x;
  zoomState.startY = touch.clientY - zoomState.y;
}

function beginPinch(touchA, touchB) {
  zoomState.isPinching = true;
  zoomState.isSwiping = false;
  zoomState.isPanning = false;
  zoomState.startScale = zoomState.scale;
  zoomState.startDistance = getTouchDistance(touchA, touchB);
  const center = getTouchCenter(touchA, touchB);
  zoomState.startCenterX = center.x - zoomState.x;
  zoomState.startCenterY = center.y - zoomState.y;
}

function openSceneLightbox(index) {
  const lightbox = document.getElementById('sceneLightbox');
  showSceneAt(index);
  lightbox.classList.add('open');
  lightbox.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closeSceneLightbox() {
  const lightbox = document.getElementById('sceneLightbox');
  lightbox.classList.remove('open');
  lightbox.setAttribute('aria-hidden', 'true');
  ['sceneImagePrev', 'sceneImageCurrent', 'sceneImageNext'].forEach((id) => {
    document.getElementById(id).removeAttribute('src');
  });
  resetZoom(false);
  document.body.style.overflow = '';
}

// Random button
document.getElementById('randomBtn').addEventListener('click', () => {
  if (!movies.length) return;
  const newIdx = getRandom(currentIdx);
  renderMovie(newIdx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// Try to load movies.json from same folder (works when served locally)
async function tryFetchJson() {
  const candidates = [MOVIES_URL, './movies.json'];
  for (const file of candidates) {
    try {
      const res = await fetch(file, { cache: 'no-store' });
      if (!res.ok) continue;
      const parsed = await res.json();
      if (Array.isArray(parsed) && parsed.length) {
        movies = parsed.map((movie) => ({
          ...movie,
          title: decodeText(movie.title),
          summary: decodeText(movie.summary),
          year: decodeText(movie.year),
          tt: decodeText(movie.tt),
          genres: Array.isArray(movie.genres) ? movie.genres.map(decodeText) : [],
          reviews: Array.isArray(movie.reviews)
            ? movie.reviews.map((review) => ({
                ...review,
                title: decodeText(review?.title),
                body: decodeText(review?.body)
              }))
            : []
        }));
        resetShuffle(currentIdx);
        return true;
      }
    } catch (_) {}
  }
  return false;
}

async function tryFetchTrailers() {
  const candidates = [TRAILERS_URL, './trailers.json'];
  for (const file of candidates) {
    try {
      const res = await fetch(file, { cache: 'no-store' });
      if (!res.ok) continue;
      const parsed = await res.json();
      if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
        trailers = parsed;
        return true;
      }
    } catch (_) {}
  }
  trailers = {};
  return false;
}

// Init
document.addEventListener('DOMContentLoaded', async () => {
  const [loaded] = await Promise.all([tryFetchJson(), tryFetchTrailers()]);
  if (loaded) {
    renderMovie(getRandom());
  } else {
    document.getElementById('heroTitle').textContent = UI_TEXT.moviesLoadErrorTitle;
    document.getElementById('heroSummary').textContent = UI_TEXT.moviesLoadErrorBody;
  }
});

document.getElementById('scenesScroll').addEventListener('click', (event) => {
  const card = event.target.closest('.scene-card');
  if (!card) return;
  const sceneIndex = Number(card.dataset.sceneIndex);
  if (Number.isInteger(sceneIndex)) openSceneLightbox(sceneIndex);
});

document.getElementById('sceneLightboxClose').addEventListener('click', closeSceneLightbox);
document.getElementById('sceneLightboxPrev').addEventListener('click', () => animateSceneShift('prev'));
document.getElementById('sceneLightboxNext').addEventListener('click', () => animateSceneShift('next'));

document.getElementById('sceneLightbox').addEventListener('click', (event) => {
  if (event.target.id === 'sceneLightbox') {
    closeSceneLightbox();
  }
});

document.getElementById('sceneLightboxStage').addEventListener('touchstart', (event) => {
  if (lightboxAnimating) return;
  if (event.touches.length === 2) {
    beginPinch(event.touches[0], event.touches[1]);
    return;
  }
  if (event.touches.length !== 1) return;
  if (zoomState.scale > 1) {
    beginPan(event.touches[0]);
  } else {
    beginSwipe(event.touches[0]);
  }
}, { passive: true });

document.getElementById('sceneLightboxStage').addEventListener('touchmove', (event) => {
  if (lightboxAnimating) return;
  if (event.touches.length === 2) {
    if (!zoomState.isPinching) beginPinch(event.touches[0], event.touches[1]);
    const distance = getTouchDistance(event.touches[0], event.touches[1]);
    const center = getTouchCenter(event.touches[0], event.touches[1]);
    zoomState.scale = clamp((distance / zoomState.startDistance) * zoomState.startScale, 1, 4);
    const limits = getMaxPan(zoomState.scale);
    zoomState.x = clamp(center.x - zoomState.startCenterX, -limits.x, limits.x);
    zoomState.y = clamp(center.y - zoomState.startCenterY, -limits.y, limits.y);
    applyZoomTransform(false);
    return;
  }
  if (event.touches.length !== 1) return;
  const touch = event.touches[0];
  if (zoomState.scale > 1) {
    if (!zoomState.isPanning) beginPan(touch);
    const limits = getMaxPan(zoomState.scale);
    zoomState.x = clamp(touch.clientX - zoomState.startX, -limits.x, limits.x);
    zoomState.y = clamp(touch.clientY - zoomState.startY, -limits.y, limits.y);
    applyZoomTransform(false);
    return;
  }
  if (!zoomState.isSwiping) beginSwipe(touch);
  const stageWidth = event.currentTarget.clientWidth || 1;
  zoomState.swipeDeltaX = touch.clientX - zoomState.swipeStartX;
  zoomState.swipeLastX = touch.clientX;
  zoomState.swipeLastTime = performance.now();
  const percentOffset = softenedSwipePercent(zoomState.swipeDeltaX, stageWidth);
  setTrackPosition(-33.3333 + percentOffset, false);
}, { passive: true });

document.getElementById('sceneLightboxStage').addEventListener('touchend', (event) => {
  if (zoomState.isPinching && event.touches.length < 2) {
    zoomState.isPinching = false;
    if (zoomState.scale <= 1.02) {
      resetZoom(true);
    } else {
      const limits = getMaxPan(zoomState.scale);
      zoomState.x = clamp(zoomState.x, -limits.x, limits.x);
      zoomState.y = clamp(zoomState.y, -limits.y, limits.y);
      applyZoomTransform(true);
    }
  }
  if (zoomState.scale > 1) {
    zoomState.isPanning = false;
    return;
  }
  if (!zoomState.isSwiping) return;
  zoomState.isSwiping = false;
  const stageWidth = event.currentTarget.clientWidth || 1;
  const timeDiff = Math.max(1, performance.now() - zoomState.swipeLastTime);
  const velocityX = (event.changedTouches[0]?.clientX - zoomState.swipeLastX) / timeDiff;
  const shouldAdvance = Math.abs(zoomState.swipeDeltaX) > stageWidth * 0.12 || Math.abs(velocityX) > 0.32;
  if (shouldAdvance) {
    animateSceneShift(zoomState.swipeDeltaX > 0 ? 'prev' : 'next');
  } else {
    setTrackPosition(-33.3333, true);
  }
  zoomState.swipeDeltaX = 0;
}, { passive: true });

document.getElementById('sceneLightboxStage').addEventListener('touchcancel', () => {
  if (zoomState.scale > 1) {
    const limits = getMaxPan(zoomState.scale);
    zoomState.x = clamp(zoomState.x, -limits.x, limits.x);
    zoomState.y = clamp(zoomState.y, -limits.y, limits.y);
    applyZoomTransform(true);
    return;
  }
  setTrackPosition(-33.3333, true);
  zoomState.isSwiping = false;
  zoomState.isPanning = false;
  zoomState.isPinching = false;
  zoomState.swipeDeltaX = 0;
}, { passive: true });

document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape') {
    closeSceneLightbox();
  }
  const lightboxOpen = document.getElementById('sceneLightbox').classList.contains('open');
  if (!lightboxOpen || zoomState.scale > 1) return;
  if (event.key === 'ArrowLeft') {
    animateSceneShift('prev');
  }
  if (event.key === 'ArrowRight') {
    animateSceneShift('next');
  }
});

document.addEventListener('click', (event) => {
  const button = event.target.closest('.expandable-toggle');
  if (!button) return;
  const copy = button.previousElementSibling;
  if (!copy || !copy.classList.contains('expandable-copy')) return;
  const expanded = copy.dataset.expanded === 'true';
  copy.dataset.expanded = expanded ? 'false' : 'true';
  copy.textContent = expanded ? copy.dataset.collapsed : copy.dataset.full;
  button.textContent = expanded ? button.dataset.moreLabel : button.dataset.lessLabel;
  button.setAttribute('aria-expanded', expanded ? 'false' : 'true');
});
</script>
